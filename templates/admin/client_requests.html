<!-- templates/admin/client_requests.html -->
{% extends "admin/base.html" %}
{% block content %}
<div class="content-wrapper">
  <div class="page-header">
    <h3 class="page-title">Client Requests</h3>
  </div>
  <div class="row">
    <div class="col-12 grid-margin stretch-card">
      <div class="card">
        <div class="card-body">
          <h4 class="card-title">Request List</h4>
          <table class="table">
            <thead>
              <tr>
                <th>Request</th>
                <th>Client</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              {% for req in requests %}
              <tr>
                <td>{{ req.request }}</td>
                <td>{{ req.client }}</td>
                <td><label class="badge badge-{{ 'danger' if req.status == 'Pending' else 'success' }}">{{ req.status }}</label></td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
