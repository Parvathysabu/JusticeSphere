<!-- templates/admin/case_history.html -->
{% extends "admin/base.html" %}
{% block content %}
<div class="content-wrapper">
  <div class="page-header">
    <h3 class="page-title">Case History</h3>
  </div>
  <div class="row">
    <div class="col-12 grid-margin stretch-card">
      <div class="card">
        <div class="card-body">
          <h4 class="card-title">Case List</h4>
          <table class="table">
            <thead>
              <tr>
                <th>Case</th>
                <th>Outcome</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>
              {% for case in cases %}
              <tr>
                <td>{{ case.case }}</td>
                <td>{{ case.outcome }}</td>
                <td>{{ case.date }}</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
