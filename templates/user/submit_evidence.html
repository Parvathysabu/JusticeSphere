<!-- templates/user/submit_evidence.html -->
{% extends "user/base.html" %}
{% block content %}
<div class="content-wrapper">
  <div class="page-header">
    <h3 class="page-title">Submit Evidence</h3>
  </div>
  <div class="row">
    <div class="col-12 grid-margin stretch-card">
      <div class="card">
        <div class="card-body">
          <h4 class="card-title">Evidence Form</h4>
          <form class="forms-sample">
            <div class="form-group">
              <label for="description">Description</label>
              <textarea class="form-control" id="description" rows="4" placeholder="Describe the evidence..."></textarea>
            </div>
            <div class="form-group">
              <label for="image-upload">Upload Image</label>
              <input type="file" class="file-upload-default" accept="image/*">
              <div class="input-group col-xs-12">
                <input type="text" class="form-control file-upload-info" disabled placeholder="Upload Image">
                <span class="input-group-append">
                  <button class="file-upload-browse btn btn-primary" type="button">Upload</button>
                </span>
              </div>
            </div>
            <div class="form-group">
              <label for="video-upload">Upload Video</label>
              <input type="file" class="file-upload-default" accept="video/*">
              <div class="input-group col-xs-12">
                <input type="text" class="form-control file-upload-info" disabled placeholder="Upload Video">
                <span class="input-group-append">
                  <button class="file-upload-browse btn btn-primary" type="button">Upload</button>
                </span>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Submit Evidence</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
