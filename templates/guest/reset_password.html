<!DOCTYPE html>
<html>

<head>
    <title>Set New Password</title>

    <style>
        body {
            font-family: Segoe UI;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }


        .password-wrapper {
            position: relative;
        }

        .password-popup {
            position: absolute;
            left: 105%;
            top: 0;
            width: 240px;
            background: #fff;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 100;
            text-align: left;
        }

        .password-popup::before {
            content: '';
            position: absolute;
            right: 100%;
            top: 15px;
            border: 8px solid transparent;
            border-right-color: #fff;
        }

        .password-popup h4 {
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #333;
        }

        .requirement {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .requirement.valid {
            color: #2e7d32;
        }

        .requirement.invalid {
            color: #d32f2f;
        }

        @media(max-width: 900px) {
            .password-popup {
                position: static;
                width: 100%;
                margin-top: 10px;
                margin-bottom: 20px;
            }

            .password-popup::before {
                display: none;
            }
        }
    </style>

</head>

<body>

    <div class="card">

        <h2>Set New Password</h2>

        <form method="POST">

            <div class="password-wrapper">
                <input type="password" name="password" id="passwordInput" placeholder="New Password"
                    pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}"
                    title="Minimum 8 characters with letter, number and special character" required>

                <div class="password-popup" id="passwordPopup">
                    <h4>Password Requirements:</h4>
                    <div class="requirement" id="req-length">● At least 8 characters</div>
                    <div class="requirement" id="req-letter">● At least one letter</div>
                    <div class="requirement" id="req-number">● At least one number</div>
                    <div class="requirement" id="req-special">● At least one special character (@$!%*#?&)</div>
                </div>
            </div>

            <input type="password" name="confirm_password" placeholder="Confirm Password" required>

            <button type="submit">Update Password</button>

        </form>

    </div>

    <script>
        const passwordInput = document.getElementById("passwordInput");
        const passwordPopup = document.getElementById("passwordPopup");

        const requirements = {
            length: document.getElementById("req-length"),
            letter: document.getElementById("req-letter"),
            number: document.getElementById("req-number"),
            special: document.getElementById("req-special")
        };

        function validatePassword(value) {
            const checks = {
                length: value.length >= 8,
                letter: /[A-Za-z]/.test(value),
                number: /\d/.test(value),
                special: /[@$!%*#?&]/.test(value)
            };

            Object.keys(checks).forEach(key => {
                if (checks[key]) {
                    requirements[key].classList.add("valid");
                    requirements[key].classList.remove("invalid");
                    requirements[key].innerText = "✓ " + requirements[key].innerText.replace(/^[●✓✗] /, "");
                } else {
                    requirements[key].classList.add("invalid");
                    requirements[key].classList.remove("valid");
                    requirements[key].innerText = "✗ " + requirements[key].innerText.replace(/^[●✓✗] /, "");
                }
            });

            return Object.values(checks).every(Boolean);
        }

        passwordInput.addEventListener("focus", () => {
            passwordPopup.style.display = "block";
            validatePassword(passwordInput.value);
        });

        passwordInput.addEventListener("input", () => {
            validatePassword(passwordInput.value);
        });

        passwordInput.addEventListener("blur", () => {
            if (validatePassword(passwordInput.value)) {
                passwordPopup.style.display = "none";
            }
        });
    </script>
</body>

</html>
